name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Deploy main app as a Cloudflare Worker (uses wrangler.jsonc config)
  deploy-app:
    name: Deploy App (Worker → app.tooloptimizercnc.com.br)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL: /

      - name: Deploy to Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy

  # Landing page deploy (requires Cloudflare Pages project "tooloptimizer-landing" to exist)
  # TODO: create project manually at dash.cloudflare.com → Pages → Create project
  # TODO: token needs "Cloudflare Pages: Edit" permission to deploy landing
  deploy-landing:
    name: Deploy Landing (Pages → www.tooloptimizercnc.com.br)
    runs-on: ubuntu-latest
    continue-on-error: true  # non-blocking: Pages project + token perms still pending
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Deploy landing to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy landing --project-name=tooloptimizer-landing --commit-dirty=true
