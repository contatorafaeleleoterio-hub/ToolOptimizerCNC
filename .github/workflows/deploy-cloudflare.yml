name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only run after CI passes
jobs:
  deploy-app:
    name: Deploy App (app.tooloptimizercnc.com.br)
    runs-on: ubuntu-latest
    needs: []  # runs independently; Cloudflare Pages will only deploy on CI success via branch protection
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Cloudflare base = /)
        run: npm run build
        env:
          VITE_BASE_URL: /

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=tooloptimizer-app --commit-dirty=true

  deploy-landing:
    name: Deploy Landing (www.tooloptimizercnc.com.br)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Deploy landing to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy landing --project-name=tooloptimizer-landing --commit-dirty=true
