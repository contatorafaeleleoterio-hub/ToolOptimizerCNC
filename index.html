          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O RPM é calculado pela fórmula: RPM = (Vc × 1000) / (π × D), onde Vc é a velocidade de corte em m/min e D é o diâmetro da ferramenta em mm. O ToolOptimizer realiza este cálculo automaticamente ao inserir os parâmetros."
