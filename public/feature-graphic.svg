<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1419"/>
      <stop offset="100%" style="stop-color:#141E28"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00D9FF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00D9FF;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="166" x2="1024" y2="166" stroke="#00D9FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="333" x2="1024" y2="333" stroke="#00D9FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="341" y1="0" x2="341" y2="500" stroke="#00D9FF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="682" y1="0" x2="682" y2="500" stroke="#00D9FF" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Glow bar center -->
  <rect x="0" y="200" width="1024" height="100" fill="url(#glow)"/>

  <!-- Cyan glow blob -->
  <ellipse cx="512" cy="250" rx="300" ry="120" fill="#00D9FF" fill-opacity="0.04" filter="url(#blur)"/>

  <!-- Border frame -->
  <rect x="1" y="1" width="1022" height="498" fill="none" stroke="#00D9FF" stroke-opacity="0.15" stroke-width="1" rx="0"/>

  <!-- Corner accents -->
  <polyline points="0,40 0,0 40,0" fill="none" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="2"/>
  <polyline points="984,0 1024,0 1024,40" fill="none" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="2"/>
  <polyline points="0,460 0,500 40,500" fill="none" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="2"/>
  <polyline points="984,500 1024,500 1024,460" fill="none" stroke="#00D9FF" stroke-opacity="0.5" stroke-width="2"/>

  <!-- App name -->
  <text x="512" y="195" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="56" font-weight="700" fill="#FFFFFF" letter-spacing="-1">ToolOptimizer</text>
  <text x="512" y="255" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="56" font-weight="700" fill="#00D9FF" letter-spacing="-1">CNC</text>

  <!-- Tagline -->
  <text x="512" y="310" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">Calcule RPM, Avanço e Potência em menos de 2 segundos</text>

  <!-- Pills / badges -->
  <!-- RPM pill -->
  <rect x="220" y="360" width="130" height="38" rx="19" fill="rgba(0,217,255,0.1)" stroke="#00D9FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="285" y="384" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="600" fill="#00D9FF">RPM</text>

  <!-- Avanço pill -->
  <rect x="370" y="360" width="130" height="38" rx="19" fill="rgba(0,217,255,0.1)" stroke="#00D9FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="435" y="384" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="600" fill="#00D9FF">Avanço</text>

  <!-- Kienzle pill -->
  <rect x="520" y="360" width="130" height="38" rx="19" fill="rgba(57,255,20,0.08)" stroke="#39FF14" stroke-opacity="0.3" stroke-width="1"/>
  <text x="585" y="384" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="600" fill="#39FF14">Kienzle</text>

  <!-- Offline pill -->
  <rect x="670" y="360" width="130" height="38" rx="19" fill="rgba(57,255,20,0.08)" stroke="#39FF14" stroke-opacity="0.3" stroke-width="1"/>
  <text x="735" y="384" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="600" fill="#39FF14">Offline</text>

  <!-- Gratuito label -->
  <text x="512" y="458" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.3)" letter-spacing="2">GRATUITO · SEM CADASTRO · SEM ANÚNCIOS</text>
</svg>
