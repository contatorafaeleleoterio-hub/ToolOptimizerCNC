<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>ToolOptimizer CNC</title>
    <script>
      // SPA redirect for GitHub Pages AND Cloudflare Pages
      // On GitHub Pages the app lives at /ToolOptimizerCNC/ (1 segment to keep)
      // On Cloudflare Pages the app lives at / (0 segments to keep)
      // Auto-detect by checking if hostname is github.io
      var isGitHubPages = window.location.hostname.indexOf('github.io') !== -1;
      var pathSegmentsToKeep = isGitHubPages ? 1 : 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
